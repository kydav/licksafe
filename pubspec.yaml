name: licksafe
description: Scan food ingredient labels to check for dog toxins.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Firebase
  firebase_core: ^3.13.1
  cloud_firestore: ^5.6.12
  firebase_analytics: ^11.6.0
  firebase_crashlytics: ^4.3.10
  # Camera & OCR
  camera: ^0.11.1
  google_mlkit_text_recognition: ^0.15.0
  image_picker: ^1.1.2
  # State
  flutter_riverpod: ^2.6.1
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.21.3+1
  # Utils
  shared_preferences: ^2.5.3
  uuid: ^4.5.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/data/

flutter_native_splash:
  color: "#0a1628"
  color_dark: "#0a1628"
  web: false

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#1AB394"
  adaptive_icon_foreground: "assets/icon/icon.png"
  image_path_ios: "assets/icon/icon.png"
  ios_dark_image_path: "assets/icon/icon_dark.png"
  ios_tinted_image_path: "assets/icon/icon_tinted.png"
